name: Build & deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Tectonic
        uses: wtfjoke/setup-tectonic@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build per-page PDFs
        run: npx myst build --pdf

      - name: Build site
        env:
          BASE_URL: /${{ env.REPO_NAME }}
        run: npx myst build --html

      - name: Deploy to gh-pages branch
        run: |
          set -euo pipefail
          out=_build/html
          test -d "$out" || { echo "build output missing: $out"; exit 1; }

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Prevent Jekyll processing on Pages so files starting with _ are served.
          touch "$out/.nojekyll"

          # Build an orphan tree of the output and force-push as a single commit.
          # No history is kept on gh-pages — site is reproducible from main.
          worktree=$(mktemp -d)
          git worktree add --no-checkout "$worktree" HEAD
          git -C "$worktree" checkout --orphan gh-pages
          git -C "$worktree" rm -rf --quiet . || true
          cp -a "$out"/. "$worktree"/
          git -C "$worktree" add -A
          git -C "$worktree" commit -m "site: ${COMMIT_SHA:0:7}"
          git -C "$worktree" push --force origin gh-pages
          git worktree remove --force "$worktree"
